<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="giris">
   <form class="giris-form">
    <h2>Giriş Yap</h2>
    
    <div class="input-group">
        <label>Kullanıcı Adı</label>
        <input type="text" placeholder="Kullanıcı adınızı girin" required>
    </div>

    <div class="input-group">
        <label>Şifre</label>
        <input type="password" placeholder="Şifrenizi girin" required>
    </div>

    <button type="submit" class="giris-btn">Giriş</button>

    <div class="form-ici-link">
        <p>Henüz hesabınız yok mu?</p>
        <p>Önce <a href="kayit.html">Kayıt Olunuz</a></p>
    </div>
</form>
</div>

</body>
</html>
