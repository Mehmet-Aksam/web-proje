<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>İletişim</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff8a00, #ffb347);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      color: white;
    }

    h1 {
      margin-bottom: 30px;
    }

    .kartlar {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .kart {
      background: white;
      color: black;
      width: 250px;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .kart:hover {
      transform: translateY(-10px);
    }

    .kart img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
    }

    .kart h3 {
      margin-bottom: 10px;
    }

    .kart p {
      margin: 5px 0;
    }

    .geri {
      margin-top: 30px;
      display: inline-block;
      padding: 10px 20px;
      background: white;
      color: #ff8a00;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    .geri:hover {
      background: #f2f2f2;
    }

    .anket-btn {
      margin-top: 15px;
      display: inline-block;
      padding: 10px 20px;
      background: #ff8a00;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .anket-btn:hover {
      background: #e67e00;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>İletişim</h1>

    <div class="kartlar">

      <!-- SEN -->
      <div class="kart">
        <img src="ben.jpg">
        <h3>Mehmet Akşam</h3>
        <p>📧 mehmet@example.com</p>
        <p>📱 0543 780 94 46</p>
      </div>

      <!-- ARKADAŞ 1 -->
      <div class="kart">
        <img src="images/user2.jpg">
        <h3>Ahmet Dağdeviren </h3>
        <p>📧 arkadas1@example.com</p>
      </div>

      <!-- ARKADAŞ 2 -->
      <div class="kart">
        <img src="images/user3.jpg">
        <h3>Emirhan Şanlıtürk </h3>
        <p>📧 arkadas2@example.com</p>
      </div>

      <!-- ANKET -->
      <div class="kart" style="border: 2px solid #ff8a00;">
        <img src="survey.png" alt="Anket">
        <h3>Görüşleriniz</h3>
        <p>Platformumuzu geliştirmemize yardımcı olun.</p>
        <a href="https://ahmet29tr.app.n8n.cloud/form/4bf96077-d5e9-412c-8c04-a5eb2f59159c" target="_blank" class="anket-btn">Ankete Katıl</a>
      </div>

    </div>

    <a href="index.html" class="geri">Ana Sayfaya Dön</a>
  </div>

</body>
</html>
