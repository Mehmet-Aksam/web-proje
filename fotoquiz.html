<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foto Quiz</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #fff6ec, #ffe3c7);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .quiz-card {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #333;
        }

        img {
            width: 180px;
            max-width: 100%;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .soru {
            font-size: 20px;
            margin-bottom: 15px;
            color: #222;
            font-weight: bold;
        }

        #secenekler button {
            display: block;
            width: 100%;
            margin: 8px 0;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #fff3e6;
            color: #ff8a00;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }

        #secenekler button:hover {
            background: #ff8a00;
            color: white;
        }

        #secenekler button:disabled {
            cursor: not-allowed;
            opacity: 0.9;
        }

        #sonuc {
            margin-top: 12px;
            font-size: 18px;
            font-weight: bold;
            min-height: 25px;
        }

        #puan {
            margin-top: 10px;
            font-size: 17px;
            color: #333;
        }

        #nextBtn {
            margin-top: 15px;
            background: orange;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            display: none;
            width: 100%;
        }

        #nextBtn:hover {
            background: #e68a00;
        }

        .geri-btn {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            background: #444;
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
        }

        .geri-btn:hover {
            background: #222;
        }
    </style>
</head>
<body>

    <div class="quiz-card">
        <h1>Foto Quiz</h1>

        <img id="resim" src="" alt="Quiz resmi">

        <div class="soru" id="soru"></div>

        <div id="secenekler"></div>

        <div id="sonuc"></div>
        <div id="puan"></div>

        <button id="nextBtn" onclick="sonrakiSoru()">Sonraki</button>

        <a href="index.html" class="geri-btn">Ana Sayfaya Dön</a>
    </div>

    <script>
        let sorular = [
            {
                resim: "kalem.jpg",
                soru: "Bu nesnenin İngilizcesi nedir?",
                secenekler: ["Pen", "Pencil", "Book", "Table"],
                dogru: "Pencil"
            },
            {
                resim: "elma.jpg",
                soru: "Bu nesnenin İngilizcesi nedir?",
                secenekler: ["Apple", "Banana", "Car", "Chair"],
                dogru: "Apple"
            }
        ];

        let index = 0;
        let dogruSayisi = 0;
        let cevaplandi = false;

        function soruyuGoster() {
            let s = sorular[index];
            cevaplandi = false;

            document.getElementById("resim").src = s.resim;
            document.getElementById("soru").innerText = s.soru;

            let alan = document.getElementById("secenekler");
            alan.innerHTML = "";

            s.secenekler.forEach(secenek => {
                let btn = document.createElement("button");
                btn.innerText = secenek;
                btn.onclick = () => kontrol(secenek);
                alan.appendChild(btn);
            });

            document.getElementById("sonuc").innerText = "";
            document.getElementById("nextBtn").style.display = "none";
            document.getElementById("puan").innerText = "Doğru sayısı: " + dogruSayisi;
        }

        function kontrol(cevap) {
            if (cevaplandi) return;

            cevaplandi = true;

            let dogru = sorular[index].dogru;
            let butonlar = document.querySelectorAll("#secenekler button");

            if (cevap === dogru) {
                document.getElementById("sonuc").innerText = "Doğru ✅";
                document.getElementById("sonuc").style.color = "green";
                dogruSayisi++;
            } else {
                document.getElementById("sonuc").innerText = "Yanlış ❌ (Doğru cevap: " + dogru + ")";
                document.getElementById("sonuc").style.color = "red";
            }

            butonlar.forEach(btn => {
                btn.disabled = true;

                if (btn.innerText === dogru) {
                    btn.style.background = "green";
                    btn.style.color = "white";
                } else if (btn.innerText === cevap && cevap !== dogru) {
                    btn.style.background = "red";
                    btn.style.color = "white";
                }
            });

            document.getElementById("puan").innerText = "Doğru sayısı: " + dogruSayisi;
            document.getElementById("nextBtn").style.display = "block";
        }

        function sonrakiSoru() {
            index++;

            if (index < sorular.length) {
                soruyuGoster();
            } else {
                document.querySelector(".quiz-card").innerHTML = `
                    <h2>Quiz Bitti 🎉</h2>
                    <p style="font-size:20px; margin-top:15px;">Toplam doğru sayısı: ${dogruSayisi}</p>
                    <a href="index.html" class="geri-btn">Ana Sayfaya Dön</a>
                `;
            }
        }

        soruyuGoster();
    </script>

</body>
</html>
